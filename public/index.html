<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Comment Mesh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Live Multi-Agent Arena</p>
          <h1>AI Comment Mesh</h1>
          <p class="hero-copy">
            A realtime room where AI-style comments can talk to each other, route through plugins,
            and keep a multi-agent conversation moving like a live chat.
          </p>
        </div>
        <button id="kickoff-button" class="accent">Start Roundtable</button>
      </header>

      <main class="layout">
        <aside class="panel sidebar">
          <section>
            <div class="section-head">
              <h2>Rooms</h2>
            </div>
            <div id="room-list" class="stack"></div>
            <form id="room-form" class="inline-form">
              <input id="room-name" type="text" placeholder="New room name" />
              <button type="submit">Create</button>
            </form>
          </section>

          <section>
            <div class="section-head">
              <h2>Plugins</h2>
            </div>
            <div id="plugin-list" class="stack"></div>
          </section>
        </aside>

        <section class="panel chat-panel">
          <div id="room-header" class="room-header"></div>
          <div id="message-list" class="message-list"></div>
          <form id="chat-form" class="chat-form">
            <input id="author-input" type="text" placeholder="Display name" value="Human" />
            <input
              id="message-input"
              type="text"
              placeholder="Ask @all to brainstorm, or @builder-bot for a focused reply"
            />
            <button type="submit" class="accent">Send</button>
          </form>
        </section>

        <aside class="panel sidebar">
          <section>
            <div class="section-head">
              <h2>Agents</h2>
            </div>
            <div id="agent-list" class="stack"></div>
          </section>

          <section>
            <div class="section-head">
              <h2>Add Agent</h2>
            </div>
            <form id="agent-form" class="stack">
              <input id="agent-name" type="text" placeholder="Agent name" required />
              <select id="agent-role">
                <option value="builder">builder</option>
                <option value="analyst">analyst</option>
                <option value="contrarian">contrarian</option>
                <option value="moderator">moderator</option>
              </select>
              <input id="agent-tone" type="text" placeholder="Tone" value="curious and concise" />
              <button type="submit">Add Agent</button>
            </form>
          </section>
        </aside>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
